commands:
  install: pip install aiohttp httpx tiktoken 2>/dev/null || true
  test: pytest tests/ -v
  test-cov: pytest tests/ --cov=scripts --cov-report=term-missing --cov-fail-under=80
  typecheck: python3 -m py_compile scripts/nim_router.py scripts/nim_router/*.py
  lint: python3 -m flake8 scripts/ scripts/nim_router/ --max-line-length=100 --ignore=E501,W503 2>/dev/null || echo "flake8 not installed"
  lint-fix: python3 -m black scripts/ scripts/nim_router/ 2>/dev/null || echo "black not installed"

services: {}
